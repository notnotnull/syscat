name: C Workflows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: build
      run: sudo apt install build-essential valgrind clang-format
    - name: make
      run: make
    
  clang_format:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: make checklint
